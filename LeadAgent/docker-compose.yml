services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: leadagent
      POSTGRES_USER: leadagent
      POSTGRES_PASSWORD: leadagent_dev
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadagent -d leadagent"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://leadagent:leadagent_dev@postgres:5432/leadagent
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg-data:
